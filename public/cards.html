<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Xi Card Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #fff;
         min-height: 100dvh; padding: 16px; padding-top: max(16px, env(safe-area-inset-top));
         padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  h1 { font-size: 17px; font-weight: 600; }
  .spacer { flex: 1; }
  .seg { display: flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  .seg button { background: #1c1c1c; color: #aaa; border: none; padding: 8px 14px; font-size: 14px; cursor: pointer; }
  .seg button.on { background: #fff; color: #000; }
  .btn { background: #222; color: #fff; border: 1px solid #333; border-radius: 6px;
         padding: 8px 14px; font-size: 14px; cursor: pointer; }
  .count { color: #888; font-size: 13px; }

  /* swipe view */
  #swipe { display: none; flex-direction: column; align-items: center; gap: 14px; }
  .stage { width: 100%; max-width: 460px; aspect-ratio: 1; position: relative; }
  .card { position: absolute; inset: 0; background: #fff; border-radius: 10px; overflow: hidden;
          box-shadow: 0 8px 30px rgba(0,0,0,.5); display: flex; flex-direction: column; }
  .card img { width: 100%; flex: 1; object-fit: contain; background: #fff; }
  .card .cap { color: #111; text-align: center; font-size: 15px; letter-spacing: 2px;
               padding: 10px; font-weight: 600; border-top: 1px solid #eee; }
  .controls { display: flex; gap: 22px; align-items: center; }
  .circle { width: 64px; height: 64px; border-radius: 50%; border: none; font-size: 26px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
  .no { background: #2a2a2a; color: #ff5c5c; }
  .yes { background: #fff; color: #1db954; }
  .undo { width: 46px; height: 46px; border-radius: 50%; background: #1c1c1c; color: #999; border: none; font-size: 18px; cursor: pointer; }
  .hint { color: #666; font-size: 12px; }

  /* grid view */
  #grid { display: none; }
  .group { margin-bottom: 22px; }
  .group h2 { font-size: 13px; letter-spacing: 1px; color: #ccc; margin-bottom: 8px; }
  .variants { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; }
  .tile { position: relative; background: #fff; border-radius: 8px; overflow: hidden; aspect-ratio: 1; border: 3px solid transparent; }
  .tile.kept { border-color: #1db954; }
  .tile.killed { opacity: .25; }
  .tile img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .tile .mark { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%;
                background: rgba(0,0,0,.6); color: #fff; display: none; align-items: center; justify-content: center; font-size: 15px; }
  .tile.kept .mark { display: flex; background: #1db954; }
  #picks { white-space: pre-wrap; font-family: monospace; font-size: 12px; background: #1a1a1a; border: 1px solid #333;
           border-radius: 6px; padding: 10px; margin-top: 10px; display: none; color: #9fe6b0; }
</style>
</head>
<body>
  <header>
    <h1>Xi Card Picker</h1>
    <div class="seg">
      <button id="tabSwipe" class="on">Swipe</button>
      <button id="tabGrid">Grid</button>
    </div>
    <span class="count" id="count"></span>
    <span class="spacer"></span>
    <button class="btn" id="exportBtn">Export picks</button>
  </header>

  <section id="swipe">
    <div class="stage" id="stage"></div>
    <div class="controls">
      <button class="undo" id="undoBtn" title="Undo">↩</button>
      <button class="circle no" id="noBtn" title="Discard">✕</button>
      <button class="circle yes" id="yesBtn" title="Keep">♥</button>
    </div>
    <div class="hint">Swipe / arrow keys ← discard · → keep · ↑ undo</div>
  </section>

  <section id="grid"></section>
  <pre id="picks"></pre>

<script>
const LS = 'xiCardPicks';
let items = [];          // flat list of {card, cap, variant, file}
let idx = 0;
let decisions = JSON.parse(localStorage.getItem(LS) || '{}');  // file -> 'keep'|'kill'
const history = [];

function save(){ localStorage.setItem(LS, JSON.stringify(decisions)); updateCount(); }
function updateCount(){
  const kept = Object.values(decisions).filter(v=>v==='keep').length;
  document.getElementById('count').textContent = `${kept} kept · ${items.length} total`;
}

async function load(){
  const manifest = await fetch('/cards-manifest.json').then(r=>r.json()).catch(()=>null);
  if(!manifest){ document.getElementById('stage').innerHTML='<div class="card"><div class="cap">No manifest yet</div></div>'; return; }
  items = [];
  manifest.forEach(c => c.variants.forEach(v => items.push({card:c.id, cap:c.caption, file:v})));
  updateCount();
  renderSwipe(); renderGrid();
}

/* ---- swipe ---- */
function renderSwipe(){
  const stage = document.getElementById('stage');
  // advance past already-decided
  while(idx < items.length && decisions[items[idx].file]) idx++;
  if(idx >= items.length){ stage.innerHTML = '<div class="card"><div class="cap">All done — Export your picks</div></div>'; return; }
  const it = items[idx];
  stage.innerHTML = `<div class="card" id="topcard"><img src="/cards/${it.file}" alt=""><div class="cap">${it.cap}</div></div>`;
}
function decide(d){
  if(idx >= items.length) return;
  const it = items[idx];
  decisions[it.file] = d; history.push(it.file); idx++; save(); renderSwipe(); syncTile(it.file);
}
function undo(){
  const f = history.pop(); if(!f) return;
  delete decisions[f]; const i = items.findIndex(x=>x.file===f); if(i>=0) idx=i; save(); renderSwipe(); syncTile(f);
}
document.getElementById('yesBtn').onclick=()=>decide('keep');
document.getElementById('noBtn').onclick=()=>decide('kill');
document.getElementById('undoBtn').onclick=undo;
document.addEventListener('keydown',e=>{
  if(document.getElementById('swipe').style.display==='none') return;
  if(e.key==='ArrowRight')decide('keep'); else if(e.key==='ArrowLeft')decide('kill'); else if(e.key==='ArrowUp')undo();
});
// touch swipe
let sx=0,sy=0;
document.getElementById('stage').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.getElementById('stage').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)) decide(dx>0?'keep':'kill');
});

/* ---- grid ---- */
let manifestCache=null;
async function renderGrid(){
  const g = document.getElementById('grid');
  manifestCache = manifestCache || await fetch('/cards-manifest.json').then(r=>r.json()).catch(()=>[]);
  g.innerHTML = manifestCache.map(c=>`
    <div class="group"><h2>${c.caption}</h2><div class="variants">
      ${c.variants.map(v=>`
        <div class="tile ${decisions[v]==='keep'?'kept':''} ${decisions[v]==='kill'?'killed':''}" data-file="${v}">
          <img src="/cards/${v}" alt=""><div class="mark">♥</div>
        </div>`).join('')}
    </div></div>`).join('');
  g.querySelectorAll('.tile').forEach(t=>{
    t.onclick=()=>{ const f=t.dataset.file; decisions[f] = decisions[f]==='keep' ? undefined : 'keep';
      if(!decisions[f]) delete decisions[f]; save(); t.classList.toggle('kept'); t.classList.remove('killed'); };
  });
}
function syncTile(file){
  const t = document.querySelector(`.tile[data-file="${file}"]`); if(!t) return;
  t.classList.toggle('kept', decisions[file]==='keep');
  t.classList.toggle('killed', decisions[file]==='kill');
}

/* ---- tabs / export ---- */
function show(which){
  document.getElementById('swipe').style.display = which==='swipe'?'flex':'none';
  document.getElementById('grid').style.display = which==='grid'?'block':'none';
  document.getElementById('tabSwipe').classList.toggle('on', which==='swipe');
  document.getElementById('tabGrid').classList.toggle('on', which==='grid');
}
document.getElementById('tabSwipe').onclick=()=>show('swipe');
document.getElementById('tabGrid').onclick=()=>{show('grid');renderGrid();};
document.getElementById('exportBtn').onclick=()=>{
  const kept = Object.entries(decisions).filter(([,v])=>v==='keep').map(([f])=>f);
  const p = document.getElementById('picks');
  p.style.display='block'; p.textContent = kept.length? kept.join('\n') : '(no picks yet)';
};

show('swipe'); load();
</script>
</body>
</html>
